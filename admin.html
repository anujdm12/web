<!DOCTYPE html>
<html>
<head>
    <title>Admin Panel</title>
</head>
<body>
    <h1>Contact Messages</h1>

    {% for msg in messages %}
        <div style="border:1px solid black; padding:10px; margin:10px;">
            <p><strong>Name:</strong> {{ msg[1] }}</p>
            <p><strong>Email:</strong> {{ msg[2] }}</p>
            <p><strong>Message:</strong> {{ msg[3] }}</p>
        </div>
    {% endfor %}

</body>
</html>
